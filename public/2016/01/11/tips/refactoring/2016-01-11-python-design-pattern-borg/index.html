        <p>Python Design Pattern: Borg</p>
<h2 id="Borg"><a href="#Borg" class="headerlink" title="Borg"></a>Borg</h2><p>Borg 模式实际上就是一个类的多个实例共享一个相同的状态.<br>简单的代码实现如下：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br></pre></td><td class="code"><pre><span class="line">__author__ = <span class="string">&#x27;patrick&#x27;</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Borg</span>:</span></span><br><span class="line">    _share_state = &#123;&#125;</span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__init__</span>(<span class="params">self</span>):</span></span><br><span class="line">        self.__dict__ = self._share_state</span><br><span class="line">        self.state = <span class="string">&#x27;Init&#x27;</span></span><br><span class="line"></span><br><span class="line">    <span class="function"><span class="keyword">def</span> <span class="title">__str__</span>(<span class="params">self</span>):</span></span><br><span class="line">        <span class="keyword">return</span> self.state</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">YourBorg</span>(<span class="params">Borg</span>):</span></span><br><span class="line">    <span class="keyword">pass</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">&#x27;__main__&#x27;</span>:</span><br><span class="line">    rm1 = Borg()</span><br><span class="line">    rm2 = Borg()</span><br><span class="line">    rm1.state = <span class="string">&#x27;Idle&#x27;</span></span><br><span class="line">    rm2.state = <span class="string">&#x27;Running&#x27;</span></span><br><span class="line"></span><br><span class="line">    print(<span class="string">&#x27;rm1: &#123;0&#125;&#x27;</span>.format(rm1))</span><br><span class="line">    print(<span class="string">&#x27;rm2: &#123;0&#125;&#x27;</span>.format(rm2))</span><br><span class="line"></span><br><span class="line">    rm2.state = <span class="string">&#x27;Zombie&#x27;</span></span><br><span class="line"></span><br><span class="line">    print(<span class="string">&#x27;rm1: &#123;0&#125;&#x27;</span>.format(rm1))</span><br><span class="line">    print(<span class="string">&#x27;rm2: &#123;0&#125;&#x27;</span>.format(rm2))</span><br><span class="line"></span><br><span class="line">    print(<span class="string">&#x27;rm1 id: &#123;0&#125;&#x27;</span>.format(id(rm1)))</span><br><span class="line">    print(<span class="string">&#x27;rm2 id: &#123;0&#125;&#x27;</span>.format(id(rm2)))</span><br><span class="line"></span><br><span class="line">    rm3 = YourBorg()</span><br><span class="line"></span><br><span class="line">    print(<span class="string">&#x27;rm1: &#123;0&#125;&#x27;</span>.format(rm1))</span><br><span class="line">    print(<span class="string">&#x27;rm2: &#123;0&#125;&#x27;</span>.format(rm2))</span><br><span class="line">    print(<span class="string">&#x27;rm3: &#123;0&#125;&#x27;</span>.format(rm3))</span><br><span class="line"></span><br></pre></td></tr></table></figure>
