  <div class="article-top-meta">
    <span class="posted-on">

  <div class="article-content">
    <div class="entry">
      
        <p>python中对于string有些挺有意思操作,现在把他记录如下：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">output = <span class="string">&#x27;Hello &#123;0&#125;!&#x27;</span>.format(<span class="string">&#x27;World!&#x27;</span>)</span><br><span class="line">output1 = <span class="string">&#x27;Hello &#123;0&#125; &#123;1&#125; !&#x27;</span>.format(<span class="string">&#x27;Mr.&#x27;</span>,<span class="string">&#x27;World!&#x27;</span>)</span><br><span class="line">output2 = <span class="string">&#x27;Hello &#123;name&#125; !&#x27;</span>.format(name=<span class="string">&#x27;World&#x27;</span>)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">print(output)</span><br><span class="line">print(output1)</span><br><span class="line">print(output2)</span><br></pre></td></tr></table></figure>

<p>以上可读性最好的，个人认为是:</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">output2 = <span class="string">&#x27;Hello &#123;name&#125; !&#x27;</span>.format(name=<span class="string">&#x27;World&#x27;</span>)</span><br></pre></td></tr></table></figure>

<h2 id="时间，urlparser的一起使用"><a href="#时间，urlparser的一起使用" class="headerlink" title="时间，urlparser的一起使用"></a>时间，urlparser的一起使用</h2><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">print(<span class="string">&#x27;It\&#x27;s &#123;0:%H:%M&#125;&#x27;</span>.format(datetime.today()))</span><br><span class="line">url = urlparse(<span class="string">&#x27;http://pocoo.org/&#x27;</span>)</span><br><span class="line">print(<span class="string">&#x27;&#123;0.netloc&#125; [&#123;0.scheme&#125;]&#x27;</span>.format(url))</span><br></pre></td></tr></table></figure>

<p>结果：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">It<span class="string">&#x27;s 15:16</span></span><br><span class="line"><span class="string">pocoo.org [http]</span></span><br></pre></td></tr></table></figure>

<p>是不是很方便的.</p>
