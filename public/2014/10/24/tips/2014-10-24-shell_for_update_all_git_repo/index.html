        <h1 id="更新一个目录下所有的git-repository的shell-脚本"><a href="#更新一个目录下所有的git-repository的shell-脚本" class="headerlink" title="更新一个目录下所有的git repository的shell 脚本"></a>更新一个目录下所有的git repository的shell 脚本</h1><p>最近感觉需要了解一些shell脚本的使用，刚好本地上面的一个文件夹中有一些github上面的代码仓库，所以刚好学着用shell来更新各个代码仓库</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">#! /bin/bash</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> file <span class="keyword">in</span> ./*</span><br><span class="line"><span class="keyword">do</span></span><br><span class="line">  <span class="keyword">if</span> <span class="built_in">test</span> -d <span class="variable">$file</span></span><br><span class="line">  <span class="keyword">then</span>  </span><br><span class="line">    <span class="built_in">echo</span> <span class="variable">$file</span> is directory</span><br><span class="line">    <span class="built_in">cd</span> <span class="variable">$file</span></span><br><span class="line">    a=$(<span class="built_in">pwd</span>)</span><br><span class="line">    <span class="built_in">echo</span> <span class="variable">$a</span></span><br><span class="line">    git pull</span><br><span class="line">    <span class="built_in">cd</span> ..</span><br><span class="line">    b=$(<span class="built_in">pwd</span>)</span><br><span class="line">    <span class="built_in">echo</span> <span class="variable">$b</span></span><br><span class="line">  <span class="keyword">fi</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">done</span></span><br><span class="line"></span><br></pre></td></tr></table></figure>
