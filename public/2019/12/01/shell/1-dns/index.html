        <h1 id="DNS-使用Tips"><a href="#DNS-使用Tips" class="headerlink" title="DNS 使用Tips"></a>DNS 使用Tips</h1><ul>
<li>dig 工具使用</li>
</ul>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">dig  www.baidu.com</span><br></pre></td></tr></table></figure>

<p>result:</p>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line">; &lt;&lt;&gt;&gt; DiG 9.9.7-P3 &lt;&lt;&gt;&gt; www.baidu.com</span><br><span class="line">;; global options: +cmd</span><br><span class="line">;; Got answer:</span><br><span class="line">;; -&gt;&gt;HEADER&lt;&lt;- opcode: QUERY, status: NOERROR, id: 16168</span><br><span class="line">;; flags: qr rd ra; QUERY: 1, ANSWER: 3, AUTHORITY: 0, ADDITIONAL: 1</span><br><span class="line"></span><br><span class="line">;; OPT PSEUDOSECTION:</span><br><span class="line">; EDNS: version: 0, flags:; udp: 4000</span><br><span class="line">;; QUESTION SECTION:</span><br><span class="line">;www.baidu.com.                 IN      A</span><br><span class="line"></span><br><span class="line">;; ANSWER SECTION:</span><br><span class="line">www.baidu.com.          907     IN      CNAME   www.a.shifen.com.</span><br><span class="line">www.a.shifen.com.       154     IN      A       61.135.169.121</span><br><span class="line">www.a.shifen.com.       154     IN      A       61.135.169.125</span><br><span class="line"></span><br><span class="line">;; Query time: 32 msec</span><br><span class="line">;; SERVER: 10.0.5.55<span class="comment">#53(10.0.5.55)</span></span><br><span class="line">;; WHEN: Tue Nov 28 15:28:20 CST 2017</span><br><span class="line">;; MSG SIZE  rcvd: 101</span><br></pre></td></tr></table></figure>

<p>CNAME: 事实服务器</p>
<ul>
<li>DNS Trace:</li>
</ul>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">dns www.baidu.com +trace</span><br></pre></td></tr></table></figure>

<ul>
<li>dns cache</li>
</ul>
<p>nscd in linux</p>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">nscd</span><br><span class="line">/etc/nscd.conf</span><br><span class="line"><span class="built_in">enable</span>-cache hosts yes</span><br><span class="line">/etc/init.d/nscd restart</span><br><span class="line">nscd -g</span><br><span class="line">nscd -i hosts <span class="comment"># clean cache</span></span><br></pre></td></tr></table></figure>

<ul>
<li>BIND9</li>
</ul>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">/etc/<span class="built_in">bind</span></span><br><span class="line">/etc/<span class="built_in">bind</span>/named</span><br><span class="line">/etc/named.conf</span><br><span class="line">named-checkzone</span><br></pre></td></tr></table></figure>

<ul>
<li>nslookup</li>
</ul>
<figure class="highlight sh"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">nslookup &lt;server to look <span class="keyword">for</span>&gt; &lt;dns server to use&gt;</span><br></pre></td></tr></table></figure>
